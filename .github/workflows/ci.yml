name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Test with coverage
        # Skip @tuttiai/playwright entirely — tests require a real browser
        # (install via `npx playwright install chromium` in a dedicated job)
        run: npx turbo run test --filter=!@tuttiai/playwright -- --coverage --reporter=verbose
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: packages/core/coverage/lcov.info,packages/cli/coverage/lcov.info
          fail_ci_if_error: true

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
